# Qwen3.6-27B (16-layer reduced) GRPO training config with prefix-sharing
# For 8×RTX 4090 (24GB each), TP=4
# Usage: python -m verl.trainer.main_ppo \
#   actor_rollout_ref.model.path=~/rollout-prefix/models/Qwen3-27B-text-only-16layers \
#   +trainer/config/qwen3_6_grpo_ps_16layers

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_megatron_trainer
  - _self_

data:
  max_prompt_length: 64
  max_response_length: 128
  train_batch_size: 8  # GRPO n=8 sequences per prompt
  return_raw_chat: True

actor_rollout_ref:
  hybrid_engine: True

  model:
    path: ~/rollout-prefix/models/Qwen3-27B-text-only-16layers
    override_config:
      model_config: {}
    use_fused_kernels: False
    use_remove_padding: True  # Required for prefix-sharing

  actor:
    strategy: megatron
    ppo_micro_batch_size_per_gpu: 8
    ppo_mini_batch_size: 8
    ppo_micro_batch_size: 8
    prefix_sharing_config:
      enable_prefix_sharing: True
      min_prefix_len: 64
      min_group_size: 8

  rollout:
    name: hf
    mode: sync  # Required for native rollout without vLLM
    tensor_model_parallel_size: 4
    n: 8  # GRPO: generate 8 responses per prompt

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: True
  use_kl_in_reward: False
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.001

trainer:
  total_epochs: 3
  total_training_steps: 100
  project_name: prefix_sharing_qwen3_6
  experiment_name: grpo_ps_16layers
  logger: ["console"]
  nnodes: 1
  n_gpus_per_node: 8
  save_freq: -1
  val_before_train: False