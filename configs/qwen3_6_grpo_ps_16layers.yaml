# Qwen3.6-27B (16-layer reduced) GRPO training config with prefix-sharing
# For 8×RTX 4090 (24GB each), TP=4, 4 GPUs
# Usage: bash scripts/run_grpo_ps.sh

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_megatron_trainer
  - _self_

data:
  train_files: ~/rollout-prefix/prefix-0501/data/gsm8k_train.parquet
  val_files: ~/rollout-prefix/prefix-0501/data/gsm8k_test.parquet
  max_prompt_length: 64
  max_response_length: 128
  train_batch_size: 8
  return_raw_chat: True
  prompt_key: prompt
  reward_fn_key: data_source

actor_rollout_ref:
  hybrid_engine: True

  model:
    path: ~/rollout-prefix/models/Qwen3-27B-text-only-16layers
    override_config:
      model_config: {}
    use_fused_kernels: False
    use_remove_padding: True
    external_lib: null

  actor:
    strategy: megatron
    ppo_micro_batch_size_per_gpu: 2
    ppo_mini_batch_size: 8
    use_kl_loss: False
    megatron:
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 1
      use_remove_padding: True

  ref:
    strategy: megatron
    log_prob_micro_batch_size_per_gpu: 2
    megatron:
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 1

  rollout:
    name: hf
    mode: sync
    tensor_model_parallel_size: 4
    n: 8
    response_length: 128
    temperature: 0.7
    max_num_startups: 1
    do_sample: True
    load_format: dummy

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: True
  use_kl_in_reward: False
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.001

reward_model:
  enable: False

custom_reward_function:
  path: ~/rollout-prefix/prefix-0501/scripts/rule_reward.py
  name: compute_score

critic:
  enable: False
  strategy: megatron

trainer:
  total_epochs: 1
  total_training_steps: 5
  project_name: prefix_sharing_qwen3_6
  experiment_name: grpo_ps_16layers
  logger: ["console"]
  nnodes: 1
  n_gpus_per_node: 4
  save_freq: -1
  val_before_train: False